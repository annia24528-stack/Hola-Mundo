<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪻 Botánica OS | Neon Connected</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪻</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --amz-dark: #131921; --amz-gold: #febd69; --bg: #0f1111; --card: #1a1a1a; --text: #f3f3f3; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        nav { width: 280px; background: var(--amz-dark); border-right: 1px solid #333; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-logo { padding: 30px 20px; color: var(--amz-gold); font-size: 1.6rem; font-weight: bold; border-bottom: 1px solid #232f3e; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 18px 25px; cursor: pointer; transition: 0.3s; color: #ccc; display: flex; align-items: center; gap: 15px; font-size: 0.95rem; }
        .nav-item:hover { background: #232f3e; color: white; }
        .nav-item.active { background: #232f3e; color: white; border-left: 5px solid var(--amz-gold); }
        main { flex-grow: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; background: radial-gradient(circle at top right, #161d1d, #0f1111); }
        .view { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        .card { background: var(--card); padding: 35px; border-radius: 10px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--amz-gold); font-weight: 400; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 4px; border: 1px solid #888; background: white; color: black; font-size: 1rem; box-sizing: border-box; }
        .btn-amazon { background: var(--amz-gold); color: #111; border: none; padding: 16px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; margin-top: 15px; }
        .btn-amazon:hover { background: #f3a847; transform: translateY(-1px); }
        .img-drop { border: 2px dashed #444; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; margin: 15px 0; background: rgba(255,255,255,0.02); }
        #preview { width: 100%; max-height: 350px; object-fit: contain; display: none; margin-top: 15px; border-radius: 6px; border: 1px solid var(--amz-gold); }
        .obs-card { background: #232f3e; padding: 25px; border-radius: 8px; margin-bottom: 20px; position: relative; border: 1px solid #3a4553; }
        .obs-header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px; }
        .user-tag { color: var(--amz-gold); font-weight: bold; }
        .badge { background: #1a1a1a; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-right: 10px; border: 1px solid #444; }
        .trash-btn { position: absolute; top: 20px; right: 20px; color: #ff6b6b; cursor: pointer; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">🪻 BOTÁNICA PRO</div>
    <div class="nav-item active" onclick="nav('v-reg', this)"><i class="fas fa-id-card"></i> Registro Staff</div>
    <div class="nav-item" onclick="nav('v-bit', this)"><i class="fas fa-edit"></i> Bitácora Campo</div>
    <div class="nav-item" onclick="nav('v-hist', this)"><i class="fas fa-layer-group"></i> Historial Maestro</div>
    <div id="admin-only" style="display:none">
        <div class="nav-item" onclick="nav('v-admin', this)" style="color:var(--amz-gold)"><i class="fas fa-user-shield"></i> Gestionar Staff</div>
    </div>
    <div style="margin-top:auto" class="nav-item" onclick="unlockAdmin()"><i class="fas fa-key"></i> Modo Admin</div>
</nav>

<main>
    <div id="v-reg" class="view active">
        <div class="card">
            <h2>Registro de Personal Científico</h2>
            <input type="text" id="reg-name" placeholder="Nombre completo o ID de Equipo">
            <select id="reg-type">
                <option value="IND">Investigador Individual 👤</option>
                <option value="EQP">Equipo de Trabajo 👥</option>
            </select>
            <button class="btn-amazon" onclick="saveUser()">ALTA DE SISTEMA</button>
        </div>
    </div>

    <div id="v-bit" class="view">
        <div class="card">
            <h2>Nueva Entrada de Observación 🪻</h2>
            <select id="bit-user"><option>Cargando lista...</option></select>
            <div style="display:flex; gap:15px;">
                <input type="number" id="bit-h" placeholder="Altura (cm)">
                <input type="number" id="bit-w" placeholder="Ancho W (cm)">
            </div>
            <div style="display:flex; gap:15px;">
                <select id="bit-salud">
                    <option value="Saludable">🌱 Saludable</option>
                    <option value="Enferma">🍂 Enferma</option>
                    <option value="Seca">🔥 Seca</option>
                </select>
                <select id="bit-riego">
                    <option value="Abono Orgánico">🍃 Abono Orgánico</option>
                    <option value="Abono Químico">🧪 Abono Químico</option>
                    <option value="Sin Abono">🚫 Sin Abono</option>
                </select>
            </div>
            <textarea id="bit-obs" rows="4" placeholder="Notas de campo..."></textarea>
            <div class="img-drop" onclick="document.getElementById('f-in').click()">
                <i class="fas fa-camera" style="font-size: 2rem; color: var(--amz-gold);"></i><br>
                <span>Subir Foto Evidencia</span>
                <input type="file" id="f-in" hidden accept="image/*" onchange="previewImg(this)">
                <img id="preview">
            </div>
            <button class="btn-amazon" onclick="submitData()">GUARDAR REPORTE</button>
        </div>
    </div>

    <div id="v-hist" class="view">
        <h2>Archivo Maestro de Campo</h2>
        <div id="hist-list"></div>
    </div>

    <div id="v-admin" class="view">
        <div class="card">
            <h2>Gestión de Usuarios</h2>
            <div id="admin-user-list"></div>
        </div>
    </div>
</main>

<script>
    // CONFIGURACIÓN DE NEON DATA API
    const API = 'https://ep-nameless-haze-amtis2xa.apirest.c-5.us-east-1.aws.neon.tech/neondb/rest/v1';
    const NEON_KEY = 'napi_ca8p7w98lwaezp5qm10t6enmbt5ga0txedel6jlf7u1ha41isu8mzn626ufxs1iu';
    
    let base64Image = "";
    let adminMode = false;

    // Headers reutilizables para Neon
    const neonHeaders = {
        'Neon-Api-Key': NEON_KEY,
        'Content-Type': 'application/json'
    };

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'v-bit') fetchUsers();
        if(id === 'v-hist') loadHistory();
        if(id === 'v-admin') fetchUsersAdmin();
    }

    async function unlockAdmin() {
        const { value: pw } = await Swal.fire({
            title: 'CLAVE GHOST',
            input: 'text',
            background: '#1a1a1a', color: '#febd69', confirmButtonColor: '#febd69'
        });
        if(pw === 'osio2023') {
            adminMode = true;
            document.getElementById('admin-only').style.display = 'block';
            Swal.fire('Admin Unlock', 'Modo edición activado', 'success');
            loadHistory();
        }
    }

    function previewImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Image = e.target.result;
            const p = document.getElementById('preview');
            p.src = base64Image; p.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function submitData() {
        const d = {
            altura_cm: parseFloat(document.getElementById('bit-h').value) || 0,
            ancho_cm: parseFloat(document.getElementById('bit-w').value) || 0,
            estado_salud: document.getElementById('bit-salud').value,
            observaciones: `${document.getElementById('bit-riego').value}. ${document.getElementById('bit-obs').value}`,
            foto_base64: base64Image
        };

        const res = await fetch(`${API}/observaciones`, {
            method: 'POST',
            headers: neonHeaders,
            body: JSON.stringify(d)
        });

        if(res.ok) {
            Swal.fire('Éxito', 'Reporte guardado en Neon', 'success');
            document.getElementById('bit-h').value = "";
            document.getElementById('bit-w').value = "";
            document.getElementById('bit-obs').value = "";
            document.getElementById('preview').style.display = "none";
            base64Image = "";
            nav('v-hist', document.querySelectorAll('.nav-item')[2]);
        }
    }

    async function loadHistory() {
        const list = document.getElementById('hist-list');
        list.innerHTML = '<p>Sincronizando con Neon...</p>';
        try {
            const r = await fetch(`${API}/observaciones`, { headers: neonHeaders });
            const data = await r.json();
            list.innerHTML = data.reverse().map(o => `
                <div class="obs-card">
                    ${adminMode ? `<i class="fas fa-trash trash-btn" style="display:block" onclick="deleteObs(${o.id})"></i>` : ''}
                    <div class="obs-header">
                        <span class="user-tag">ID Registro: #${o.id}</span>
                        <span style="opacity:0.5; font-size:0.8rem;">${o.fecha ? new Date(o.fecha).toLocaleDateString() : 'Hoy'}</span>
                    </div>
                    <div style="margin-bottom:15px;">
                        <span class="badge">📏 H: ${o.altura_cm || 0}cm</span>
                        <span class="badge">↔️ W: ${o.ancho_cm || 0}cm</span>
                        <span class="badge">🩺 ${o.estado_salud || 'N/A'}</span>
                    </div>
                    <p style="font-size:0.9rem; color:#bbb;">"${o.observaciones || 'Sin notas'}"</p>
                    ${o.foto_base64 ? `<img src="${o.foto_base64}" style="width:100%; border-radius:8px; margin-top:15px; border:1px solid #444;">` : ''}
                </div>
            `).join('');
        } catch (e) { list.innerHTML = "Error al conectar con Neon."; }
    }

    async function fetchUsers() {
        try {
            const r = await fetch(`${API}/usuarios`, { headers: neonHeaders });
            const d = await r.json();
            document.getElementById('bit-user').innerHTML = d.length ? 
                d.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('') :
                '<option>No hay personal registrado</option>';
        } catch(e) {
            document.getElementById('bit-user').innerHTML = '<option>Error de conexión</option>';
        }
    }

    async function fetchUsersAdmin() {
        const r = await fetch(`${API}/usuarios`, { headers: neonHeaders });
        const d = await r.json();
        document.getElementById('admin-user-list').innerHTML = d.map(u => `
            <div style="display:flex; justify-content:space-between; background:#232f3e; padding:15px; margin-bottom:10px; border-radius:5px;">
                <span>${u.nombre}</span>
                <i class="fas fa-user-minus" style="color:#ff6b6b; cursor:pointer;" onclick="deleteUser(${u.id})"></i>
            </div>
        `).join('');
    }

    async function saveUser() {
        const n = document.getElementById('reg-name').value;
        const t = document.getElementById('reg-type').value;
        if(!n) return;
        const finalName = t === 'EQP' ? `👥 EQUIPO: ${n}` : `👤 ${n}`;
        await fetch(`${API}/usuarios`, {
            method: 'POST',
            headers: neonHeaders,
            body: JSON.stringify({ nombre: finalName })
        });
        document.getElementById('reg-name').value = "";
        Swal.fire('Registrado', 'Usuario añadido a Neon', 'success');
    }

    async function deleteObs(id) {
        await fetch(`${API}/observaciones?id=eq.${id}`, { 
            method: 'DELETE',
            headers: neonHeaders
        });
        loadHistory();
    }

    async function deleteUser(id) {
        await fetch(`${API}/usuarios?id=eq.${id}`, { 
            method: 'DELETE',
            headers: neonHeaders
        });
        fetchUsersAdmin();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botánica OS | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a86b;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
        }

        /* SIDEBAR PROFESIONAL */
        nav { 
            width: 260px; 
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 20px;
        }

        .nav-logo { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: var(--primary); 
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item { 
            padding: 12px 15px; 
            margin-bottom: 5px;
            cursor: pointer; 
            border-radius: 8px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
        }

        .nav-item:hover { background: #f1f5f9; color: var(--primary); }
        .nav-item.active { background: #ecfdf5; color: var(--primary); font-weight: 600; }

        /* ÁREA DE CONTENIDO */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .view { display: none; max-width: 800px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        h2 { font-size: 1.5rem; margin-top: 0; color: #0f172a; }

        /* FORMULARIO LIMPIO */
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--border); 
            border-radius: 8px; font-size: 1rem; box-sizing: border-box;
            background: #fcfcfc;
        }
        input:focus { outline: 2px solid #00a86b33; border-color: var(--primary); }

        .btn-main { 
            background: var(--primary); color: white; border: none; 
            padding: 14px; border-radius: 8px; width: 100%; 
            font-weight: 600; cursor: pointer; transition: 0.2s; 
        }
        .btn-main:hover { background: #008f5d; transform: translateY(-1px); }

        /* HISTORIAL */
        .obs-card { 
            background: white; padding: 20px; border-radius: 12px; 
            border: 1px solid var(--border); margin-bottom: 15px; 
        }
        .badge { 
            background: #f1f5f9; padding: 4px 10px; border-radius: 6px; 
            font-size: 0.8rem; font-weight: 600; margin-right: 5px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo"><i class="fas fa-microscope"></i> Botánica OS</div>
    <div class="nav-item active" onclick="nav('v-reg', this)"><i class="fas fa-users"></i> Registro de Personal</div>
    <div class="nav-item" onclick="nav('v-bit', this)"><i class="fas fa-clipboard-list"></i> Bitácora de Campo</div>
    <div class="nav-item" onclick="nav('v-hist', this)"><i class="fas fa-database"></i> Historial Maestro</div>
</nav>

<main>
    <div id="v-reg" class="view active">
        <div class="card">
            <h2>Registro de Personal</h2>
            <div class="group">
                <label>Nombre del Investigador</label>
                <input type="text" id="reg-name" placeholder="Nombre completo">
            </div>
            <div class="group">
                <label>Tipo</label>
                <select id="reg-type">
                    <option value="IND">Científico Individual</option>
                    <option value="EQP">Equipo de Investigación</option>
                </select>
            </div>
            <button class="btn-main" onclick="saveUser()">DAR DE ALTA</button>
        </div>
    </div>

    <div id="v-bit" class="view">
        <div class="card">
            <h2>Nueva Observación</h2>
            <div class="group">
                <label>Investigador</label>
                <select id="bit-user"><option>Cargando lista...</option></select>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;" class="group">
                <div>
                    <label>Altura (cm)</label>
                    <input type="number" id="bit-h">
                </div>
                <div>
                    <label>Ancho (cm)</label>
                    <input type="number" id="bit-w">
                </div>
            </div>
            <div class="group">
                <label>Estado</label>
                <select id="bit-salud">
                    <option value="Saludable">Saludable</option>
                    <option value="Enferma">Enferma</option>
                </select>
            </div>
            <div class="group">
                <label>Notas de Campo</label>
                <textarea id="bit-obs" rows="3"></textarea>
            </div>
            <button class="btn-main" onclick="submitData()">GUARDAR EN NEON</button>
        </div>
    </div>

    <div id="v-hist" class="view">
        <h2>Registros Recientes</h2>
        <div id="hist-list"></div>
    </div>
</main>

<script>
    const API = 'https://ep-nameless-haze-amtis2xa.apirest.c-5.us-east-1.aws.neon.tech/neondb/rest/v1';
    const KEY = 'napi_ca8p7w98lwaezp5qm10t6enmbt5ga0txedel6jlf7u1ha41isu8mzn626ufxs1iu';
    const headers = { 'Neon-Api-Key': KEY, 'Content-Type': 'application/json' };

    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'v-bit') fetchUsers();
        if(id === 'v-hist') loadHistory();
    }

    async function saveUser() {
        const n = document.getElementById('reg-name').value;
        if(!n) return;
        await fetch(`${API}/usuarios`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({ nombre: n })
        });
        document.getElementById('reg-name').value = "";
        Swal.fire('Éxito', 'Personal registrado correctamente', 'success');
    }

    async function fetchUsers() {
        const r = await fetch(`${API}/usuarios`, { headers: headers });
        const d = await r.json();
        document.getElementById('bit-user').innerHTML = d.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
    }

    async function submitData() {
        const d = {
            altura_cm: parseFloat(document.getElementById('bit-h').value) || 0,
            ancho_cm: parseFloat(document.getElementById('bit-w').value) || 0,
            estado_salud: document.getElementById('bit-salud').value,
            observaciones: document.getElementById('bit-obs').value
        };
        await fetch(`${API}/observaciones`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(d)
        });
        Swal.fire('Guardado', 'Sincronizado con Neon', 'success');
        nav('v-hist', document.querySelectorAll('.nav-item')[2]);
    }

    async function loadHistory() {
        const list = document.getElementById('hist-list');
        list.innerHTML = 'Sincronizando...';
        const r = await fetch(`${API}/observaciones`, { headers: headers });
        const data = await r.json();
        list.innerHTML = data.reverse().map(o => `
            <div class="obs-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="font-weight:600; color:var(--primary);">Registro #${o.id}</span>
                    <span style="font-size:0.8rem; color:#94a3b8;">${new Date().toLocaleDateString()}</span>
                </div>
                <div>
                    <span class="badge">H: ${o.altura_cm}cm</span>
                    <span class="badge">W: ${o.ancho_cm}cm</span>
                    <span class="badge">${o.estado_salud}</span>
                </div>
                <p style="margin: 10px 0 0; font-size:0.9rem;">${o.observaciones || 'Sin notas'}</p>
            </div>
        `).join('');
    }
</script>
</body>
</html>

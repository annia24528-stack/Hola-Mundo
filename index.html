<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vida Saludable y Lavandas</title>
    <style>
        /* Estilos para que se vea moderno */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #6a1b9a; /* Color morado lavanda */
            color: white;
            width: 100%;
            padding: 40px 0;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Contenedor de los dos cuadros */
        .seccion-cuadros {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap; /* Para que en celular se pongan uno abajo del otro */
            padding: 20px;
        }

        /* Estilo de cada cuadro (Iguales) */
        .tarjeta {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 320px;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }

        .tarjeta:hover {
            transform: translateY(-10px);
        }

        .tarjeta img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .contenido {
            padding: 20px;
        }

        .boton {
            display: inline-block;
            padding: 10px 20px;
            background-color: #43a047; /* Verde para salud */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
        }

        .boton-lavanda {
            background-color: #8e24aa; /* Morado para lavanda */
        }

        .boton:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mi Página Web: Bienestar y Naturaleza</h1>
        <p>Aprende a cuidar tu cuerpo y tus plantas</p>
    </header>

    <div class="seccion-cuadros">
        
        <div class="tarjeta">
            <img src="https://images.unsplash.com/photo-1490818387583-1baba5e638af?q=80&w=400" alt="Nutrición">
            <div class="contenido">
                <h2>Vida Saludable</h2>
                <p>Consejos para una mejor nutrición y hábitos diarios.</p>
                <a href="salud.html" class="boton">Ver apartado</a>
            </div>
        </div>

        <div class="tarjeta">
            <img src="https://images.unsplash.com/photo-1591038334812-73017738f166?q=80&w=400" alt="Lavandas">
            <div class="contenido">
                <h2>Lavandas</h2>
                <p>Guía de cuidados y beneficios de la planta de lavanda.</p>
                <a href="lavanda.html" class="boton boton-lavanda">Ver apartado</a>
            </div>
        </div>

    </div>

    <script>
        // Configuración de APIdog
        const urlApidog = "https://mock.apidog.com/m1/1265509-1263354-default/saludo";
        console.log("Conectado a APIdog:", urlApidog);

        // Prueba rápida de la API en consola
        fetch(urlApidog)
            .then(res => res.json())
            .then(data => console.log("Mensaje recibido:", data))
            .catch(err => console.log("Error API:", err));
    </script>

</body>
</html>
